<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48" role="img" aria-label="콘텐츠">
  <!-- 콘텐츠 아이콘 · 투톤 회색+골드 토킷 세트 -->
  <style>
    .fill{ fill:var(--icon-fill,#7b818e); }
    .line{ fill:none; stroke:var(--icon-line,#c3c8d2); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .reward-fill{ fill:var(--icon-gold,#e8b84b); }
    .reward-line{ fill:none; stroke:var(--icon-gold-soft,#f6d488); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  </style>
  <rect class="fill" x="4" y="4" width="7" height="7" rx="1.5"/><rect class="line" x="13" y="4" width="7" height="7" rx="1.5"/><rect class="line" x="4" y="13" width="7" height="7" rx="1.5"/><rect class="fill" x="13" y="13" width="7" height="7" rx="1.5"/>
</svg>
